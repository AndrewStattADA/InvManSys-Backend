name: Django CI/CD - Inventory Backend

on:
  push:
    branches: [ "main", "feat/models" ]
  pull_request:
    branches: [ "main", "feat/models" ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      # If you move to Postgres later, you'd add it here. 
      # For now, we use Django's default SQLite for speed.
      db:
        image: postgres:15
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install coverage

    - name: Run Tests with Coverage
      env:
        # We provide a dummy key so the Password Reset tests don't crash
        SENDGRID_API_KEY: "SG.fake_key_for_testing"
        SECRET_KEY: "ci-test-secret-key"
      run: |
        coverage run --source='.' manage.py test inventory_api
        coverage report

    - name: Check Coverage Threshold
      run: |
        # This will fail the build if coverage drops below 80%
        coverage report --fail-under=80