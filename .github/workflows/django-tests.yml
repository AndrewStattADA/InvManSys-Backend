name: Django CI/CD

on:
  push:
    branches: [ "main", "feat/models" ]
  pull_request:
    branches: [ "main", "feat/models" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install and Run Tests
        shell: bash
        run: |
          # 1. Step into the folder where manage.py actually lives
          cd InvManSys-Backend
          
          # 2. Install stuff
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install coverage
          
          # 3. Run the tests
          # We provide a SECRET_KEY because Django won't run without one
          export SECRET_KEY="ci-test-key"
          export SENDGRID_API_KEY="SG.fake"
          
          coverage run manage.py test inventory_api
          coverage report --fail-under=80