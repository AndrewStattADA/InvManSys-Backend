name: Django CI/CD - Inventory Backend

on:
  push:
    branches: [ "main", "feat/models" ]
  pull_request:
    branches: [ "main", "feat/models" ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./InvManSys-Backend

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install coverage

    - name: Run Tests with Coverage
      env:
        SENDGRID_API_KEY: "SG.fake_key_for_testing"
        SECRET_KEY: "ci-test-secret-key"
      run: |
        # We use coverage to run the tests so it can track the lines hit
        coverage run manage.py test inventory_api
        coverage report

    - name: Check Coverage Threshold
      run: |
        coverage report --fail-under=80